name: Update README submission table

on:
  workflow_dispatch:
  issues:
    types:
      - opened
      - closed
      - reopened
      - labeled
      - unlabeled
      - milestoned
      - demilestoned

permissions:
  contents: write
  issues: read

concurrency:
  group: summer-course-automation-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Refresh the README submission table
        id: readme
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            const updateReadmeStatus = require('./.github/scripts/update-readme-status.cjs');
            await updateReadmeStatus({ github, context, core });

      - name: Commit the refreshed README
        if: steps.readme.outputs.changed == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          README_PATH: ${{ steps.readme.outputs.path }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$README_PATH"

          if git diff --cached --quiet; then
            echo "README is already current."
            exit 0
          fi

          git commit -m "docs: refresh summer submission status [skip ci]"

          for attempt in 1 2 3; do
            git pull --rebase origin "$DEFAULT_BRANCH"
            if git push origin "HEAD:$DEFAULT_BRANCH"; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after a short pause."
            sleep $((attempt * 2))
          done

          echo "Unable to push the refreshed README after three attempts." >&2
          exit 1
